<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국어 B: 민주쌤과 함께하는 설명 방법 & 타당성 최종 챌린지🍎</title>
    <style>
        :root { 
            --primary: #98b5d9;  
            --success: #8ab048;  
            --error: #eb3464;    
            --bg: #ffffff;       
        }

        body { font-family: 'Pretendard', sans-serif; background-color: #f1f3f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        #quiz-container { 
            background: var(--bg); 
            width: 95%; 
            max-width: 650px; 
            padding: 2.5rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }

        .stage-indicator { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .stage-badge { 
            padding: 10px 20px; 
            border-radius: 25px; 
            background: #f1f3f5; 
            color: #adb5bd; 
            font-weight: bold; 
            font-size: 0.9rem; 
            transition: all 0.3s;
        }
        .stage-badge.active { background: var(--primary); color: white; }
        .stage-badge.cleared { background: var(--success); color: white; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        
        .timer-bar { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }

        .question { font-size: 1.25rem; font-weight: 700; color: #343a40; margin-bottom: 1.8rem; line-height: 1.6; word-break: keep-all; }

        .options { display: grid; gap: 0.9rem; }
        button.opt-btn { 
            padding: 1.1rem; 
            border: 2px solid #f1f3f5; 
            border-radius: 18px; 
            background: #f8f9fa; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 1.05rem; 
            text-align: left; 
            color: #495057;
            font-weight: 500;
        }
        button.opt-btn:hover:not(:disabled) { 
            border-color: var(--primary); 
            background: #fdfdfd; 
            transform: translateY(-2px);
        }

        .correct { background-color: var(--success) !important; border-color: var(--success) !important; color: white !important; font-weight: bold; box-shadow: 0 4px 10px rgba(138, 176, 72, 0.3); }
        .wrong { background-color: var(--error) !important; border-color: var(--error) !important; color: white !important; box-shadow: 0 4px 10px rgba(235, 52, 100, 0.3); }

        #explanation { margin-top: 1.5rem; padding: 1.3rem; background: #f8f9fa; border-radius: 15px; display: none; font-size: 0.95rem; border-left: 6px solid var(--primary); line-height: 1.6; }
        
        #next-btn, .action-btn { 
            width: 100%; 
            margin-top: 1.5rem; 
            padding: 1.2rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem;
            box-shadow: 0 6px 15px rgba(152, 181, 217, 0.4);
            transition: all 0.2s;
        }
        #next-btn:hover, .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(152, 181, 217, 0.5); }

        #stage-result { text-align: center; display: none; }
        .pass-msg { color: var(--success); font-weight: bold; font-size: 1.4rem; margin: 20px 0; }
        .fail-msg { color: var(--error); font-weight: bold; font-size: 1.4rem; margin: 20px 0; }
        
        .btn-retry { background: #adb5bd !important; box-shadow: 0 6px 15px rgba(173, 181, 189, 0.4) !important; }

        .reward-box { 
            background: #fff9db; 
            padding: 1.8rem; 
            border-radius: 20px; 
            border: 2px dashed #fcc419; 
            margin-top: 25px; 
            font-weight: 600; 
            color: #e67700; 
            line-height: 1.7; 
            word-break: keep-all;
        }
    </style>
</head>
<body>
    <div id="quiz-container">
    <div class="stage-indicator">
        <div id="badge-1" class="stage-badge active">STEP 1</div>
        <div id="badge-2" class="stage-badge">STEP 2</div>
        <div id="badge-3" class="stage-badge">STEP 3</div>
    </div>

    <div id="game-area">
        <div class="header">
            <span id="progress-text" style="font-weight: bold; color: #64748b;">문제 1 / 15</span>
            <span id="timer-text" style="font-weight: bold; color: var(--primary);">20초</span>
        </div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" onclick="handleNext()">다음 문제로 →</button>
    </div>

    <div id="stage-result">
        <h2 id="result-title">스테이지 결과</h2>
        <div style="font-size: 3.5rem; font-weight: bold; color: var(--primary); margin: 1rem 0;">
            <span id="stage-score">0</span><span style="font-size: 1.5rem;">점</span>
        </div>
        <p id="stage-feedback"></p>
        <div id="action-area"></div>
    </div>
</div>

    let currentStage = 1;
    let quizData = [];
    let currentIdx = 0;
    let score = 0;
    let timeLeft = 20;
    let timerInterval;
    let isAnswered = false;

    // 팡파레 효과음 함수 (미디어 재생으로 인식되도록 보정)
    function playVictorySound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 도, 도, 미, 솔, 높은 도
        const notes = [523.25, 523.25, 659.25, 783.99, 1046.50]; 
        const durations = [0.1, 0.1, 0.1, 0.1, 0.4]; 
        
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
            
            // 볼륨 설정
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + durations[i]);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime + i * 0.15);
            osc.stop(audioCtx.currentTime + i * 0.15 + durations[i]);
        });
    }

    function initStage(stageNum) {
        currentStage = stageNum;
        currentIdx = 0;
        score = 0;
        if (stageNum === 3) {
            quizData = [...questionsDB[stageNum]].sort(() => Math.random() - 0.5).slice(0, 20);
        } else {
            quizData = [...questionsDB[stageNum]].sort(() => Math.random() - 0.5).slice(0, 15);
        }
        document.querySelectorAll('.stage-badge').forEach((b, i) => {
            b.className = 'stage-badge' + (i+1 < stageNum ? ' cleared' : i+1 === stageNum ? ' active' : '');
        });
        document.getElementById("game-area").style.display = "block";
        document.getElementById("stage-result").style.display = "none";
        loadQuestion();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ko-KR';
        window.speechSynthesis.speak(ut);
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById("timer-progress").style.width = "100%";
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById("timer-progress").style.width = (timeLeft / 20 * 100) + "%";
            document.getElementById("timer-text").innerText = Math.ceil(timeLeft) + "초";
            if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(-1); }
        }, 100);
    }

    function loadQuestion() {
        isAnswered = false;
        clearInterval(timerInterval);
        const data = quizData[currentIdx];
        document.getElementById("progress-text").innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById("question").innerText = data.q;
        document.getElementById("explanation").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        const shuffledOptions = [...data.a].sort(() => Math.random() - 0.5);
        shuffledOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(data.a.indexOf(opt));
            optionsDiv.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(idx) {
        if(isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);
        const data = quizData[currentIdx];
        const btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = true);
        const correctText = data.a[data.correct];
        if (idx === data.correct) {
            btns.forEach(b => { if(b.innerText === correctText) b.classList.add("correct"); });
            score += 1;
            speak("정답입니다!");
        } else {
            if(idx !== -1) {
                const selectedText = data.a[idx];
                btns.forEach(b => { if(b.innerText === selectedText) b.classList.add("wrong"); });
            }
            btns.forEach(b => { if(b.innerText === correctText) b.classList.add("correct"); });
            speak("오답입니다.");
        }
        document.getElementById("explanation").innerHTML = data.exp;
        document.getElementById("explanation").style.display = "block";
        document.getElementById("next-btn").style.display = "block";
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < quizData.length) loadQuestion();
        else showStageResult();
    }

    function showStageResult() {
        document.getElementById("game-area").style.display = "none";
        const resultArea = document.getElementById("stage-result");
        resultArea.style.display = "block";
        
        // 1. 점수 보정: 실제 문제 수(quizData.length)로 계산
        const finalScore = Math.round((score / quizData.length) * 100);
        document.getElementById("stage-score").innerText = finalScore;
        
        const feedback = document.getElementById("stage-feedback");
        const actionArea = document.getElementById("action-area");
        actionArea.innerHTML = "";
        const thresholds = { 1: 12, 2: 13, 3: 18 };
        const passThreshold = thresholds[currentStage];
        const isPassed = score >= passThreshold; 

        if (currentStage < 3) {
            if (isPassed) {
                feedback.innerHTML = `<div class="pass-msg">🎉 스테이지 ${currentStage} 통과!</div><p>15문제 중 ${score}문제를 맞췄습니다. 대단해요!</p>`;
                actionArea.innerHTML = `<button class="action-btn btn-next-stage" onclick="initStage(${currentStage + 1})">다음 스테이지 도전 →</button>`;
            } else {
                feedback.innerHTML = `<div class="fail-msg">😢 통과 실패 (${passThreshold}문제 이상 정답 필요)</div><p>현재 점수: ${score}개 맞춤. 조금 더 노력해봅시다!</p>`;
                actionArea.innerHTML = `<button class="action-btn btn-retry" onclick="initStage(${currentStage})">다시 도전하기 🔄</button>`;
            }
        } else {
            if (isPassed) {
                // 2. 최종 스테이지 클리어 시 효과음 재생
                playVictorySound(); 
                feedback.innerHTML = `<div class="pass-msg">🏁 마스터 챌린지 최종 성공!</div>
                                     <p>총 20문제 중 ${score}문제를 맞췄습니다.<br> 당신은 진정한 국어 마스터!</p>
                                     <div class="reward-box">
                                        스스로의 힘으로 3개 스테이지를 모두 정복한 사람!<br>
                                        시험 "전"까지 교과서를 들고<br> 민주쌤에게 오시면 선물을 드립니다.<br> (암호:저국어100점이에요) 😊
                                     </div>`;
                actionArea.innerHTML = `<button class="action-btn btn-next-stage" onclick="location.reload()">처음부터 다시 하기</button>`;
            } else {
                feedback.innerHTML = `<div class="fail-msg">😢 최종 챌린지 실패 (18문제 이상 필요)</div><p>마지막 단계는 정말 어렵죠? 다시 한 번 도전해보세요!</p>`;
                actionArea.innerHTML = `<button class="action-btn btn-retry" onclick="initStage(${currentStage})">마지막 단계 재도전 🔄</button>`;
            }
        }
    }

    alert("📢 민주쌤과 함께하는\n 🍎국어 B💳 최종 마스터 챌린지!\n\n 단계별 문제가 무작위로 제시됩니다.\n STEP 1: 12문제 이상\n STEP 2: 13문제 이상\n STEP 3: 18문제 이상 맞춰야 성공!\n모두 깬 사람에게는 아주 작은 선물이 기다리고 있어요! 🎁");
    initStage(1);
</script>
