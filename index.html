<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중2 국어 B: 설명 방법 & 타당성 최종 챌린지🍎</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f8f9fa; --locked: #94a3b8; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; width: 95%; max-width: 650px; padding: 2rem; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .stage-indicator { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .stage-badge { padding: 8px 15px; border-radius: 20px; background: #e2e8f0; color: #64748b; font-weight: bold; font-size: 0.9rem; }
        .stage-badge.active { background: var(--primary); color: white; }
        .stage-badge.cleared { background: var(--success); color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 1.5rem; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: var(--primary); transition: width 0.1s linear; }
        .question { font-size: 1.2rem; font-weight: 700; color: #2c3e50; margin-bottom: 1.5rem; line-height: 1.6; word-break: keep-all; white-space: pre-wrap; }
        .options { display: grid; gap: 0.8rem; }
        button.opt-btn { padding: 1rem; border: 2px solid #edf2f7; border-radius: 12px; background: white; cursor: pointer; transition: all 0.2s; font-size: 1rem; text-align: left; color: #4a5568; }
        button.opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background-color: #d1fae5 !important; border-color: var(--success) !important; color: #065f46; font-weight: bold; }
        .wrong { background-color: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b; }
        #explanation { margin-top: 1.5rem; padding: 1.2rem; background: #f1f5f9; border-radius: 10px; display: none; font-size: 0.95rem; border-left: 5px solid var(--primary); line-height: 1.5; }
        #next-btn { width: 100%; margin-top: 1.5rem; padding: 1.2rem; background: #2c3e50; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; }
        #stage-result { text-align: center; display: none; }
        .pass-msg { color: var(--success); font-weight: bold; margin: 15px 0; }
        .fail-msg { color: var(--error); font-weight: bold; margin: 15px 0; }
        .action-btn { width: 100%; padding: 1.2rem; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-next-stage { background: var(--primary); color: white; }
        .btn-retry { background: #64748b; color: white; }
        .reward-box { background: #fff9db; padding: 1.5rem; border-radius: 15px; border: 2px dashed #fcc419; margin-top: 20px; font-weight: 600; color: #e67700; line-height: 1.6; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="stage-indicator">
        <div id="badge-1" class="stage-badge active">STEP 1</div>
        <div id="badge-2" class="stage-badge">STEP 2</div>
        <div id="badge-3" class="stage-badge">STEP 3</div>
    </div>

    <div id="game-area">
        <div class="header">
            <span id="progress-text" style="font-weight: bold; color: #64748b;">문제 1 / 11</span>
            <span id="timer-text" style="font-weight: bold; color: var(--primary);">20초</span>
        </div>
        <div class="timer-bar"><div id="timer-progress"></div></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div id="explanation"></div>
        <button id="next-btn" onclick="handleNext()">다음 문제로 →</button>
    </div>

    <div id="stage-result">
        <h2 id="result-title">스테이지 결과</h2>
        <div style="font-size: 3rem; font-weight: bold; color: var(--primary); margin: 1rem 0;">
            <span id="stage-score">0</span><span style="font-size: 1.5rem;">점</span>
        </div>
        <p id="stage-feedback"></p>
        <div id="action-area"></div>
    </div>
</div>

<script>

            { q: "세금이나 수수료 등을 매겨서 부담하게 하는 것을 뜻하는 단어는?", a: ["부과", "도용", "명시", "선호"], correct: 0, exp: "부과입니다." },
            { q: "여럿 가운데서 특별히 가려서 좋아하는 것을 뜻하는 단어는?", a: ["선호", "도용", "명시", "부과"], correct: 0, exp: "선호입니다." },
            { q: "일 년에 한 번씩 내는 돈을 가리키는 올바른 어휘는?", a: ["연회비", "월회비", "가입비", "수수료"], correct: 0, exp: "연회비입니다." },
            { q: "세금을 정당한 방법 없이 내지 않는 행위를 뜻하는 말은?", a: ["탈세", "절세", "납세", "도용"], correct: 0, exp: "탈세입니다." },
            { q: "노르웨이는 현금을 사용할 권리를 법률로 분명하게 ( )하고 있다.", a: ["명시", "도용", "부과", "선호"], correct: 0, exp: "명시가 적절합니다." },
            { q: "'부과하다'와 가장 유사한 상황으로 적절한 것은?", a: ["환경 부담금을 매길 때", "친구에게 돈 빌릴 때", "상장을 줄 때", "이름을 몰래 쓸 때"], correct: 0, exp: "세금이나 부담금을 지우는 것입니다." },
            { q: "설명 방법의 타당성을 평가하는 두 가지 핵심 기준은?", a: ["대상의 적합성, 이해의 효과성", "참신성, 재미", "주관적 느낌, 문체", "글의 길이, 그림"], correct: 0, exp: "적합성과 효과성입니다." },
            { q: "'정의'를 사용하여 용어의 뜻을 풀이했을 때 얻는 효과는?", a: ["개념을 정확히 이해함", "감동을 줌", "원인을 파악함", "차이점이 부각됨"], correct: 0, exp: "대상의 본질적 개념을 밝힙니다." },
            { q: "설명 방법이 대상의 특성과 어울리지 않아 타당성이 떨어지는 경우는?", a: ["구성 요소를 설명하며 '대조'만 사용", "뜻을 풀이하며 '정의' 사용", "사례를 들며 '예시' 사용", "원인 결과를 밝히며 '인과' 사용"], correct: 0, exp: "구성 요소는 분석이 적합합니다." },
            { q: "차이점을 부각하여 설명할 때 '대조'가 타당한 이유는?", a: ["차이점이 선명하게 드러나므로", "유래를 알 수 있어서", "구조 파악이 좋아서", "감동을 주려고"], correct: 0, exp: "차이점을 보여주는 데 효과적입니다." },
            { q: "논설문의 서론에서 독자의 관심을 끌기 위해 하는 활동은?", a: ["화제 제시 및 흥미 유발", "주장 요약", "세부 근거 나열", "타당성 평가"], correct: 0, exp: "서론은 글의 입구입니다." },
            { q: "논설문의 본론에서 주장을 뒷받침하기 위해 주로 제시하는 것은?", a: ["이유와 구체적인 근거", "글을 쓰는 동기", "주장 재강조", "사전적 의미"], correct: 0, exp: "논리적 근거가 필요합니다." },
            { q: "논설문의 마무리 단계(결론)에서 반드시 포함되어야 할 내용은?", a: ["내용 요약 및 주장 강조", "새로운 문제 제기", "구체적인 사례 나열", "개인적인 경험"], correct: 0, exp: "주장 재강조가 핵심입니다." },
            { q: "문제점들을 '나열 구조'로 구성했을 때 얻는 효과는?", a: ["근거를 대등하게 보여주어 주장 강화", "시간 흐름 파악", "원인 결과 연결", "개념 풀이"], correct: 0, exp: "주장을 탄탄하게 만듭니다." },
            { q: "서론-본론-결론의 짜임이 논리적인지 점검하는 것은 무엇에 대한 평가인가?", a: ["내용 조직의 타당성", "표현의 참신성", "자료의 최신성", "창의성"], correct: 0, exp: "조직의 유기적 연결을 평가하는 것입니다." },
            { q: "논설문의 조직 방식은 궁극적으로 ( )에 기여해야 한다.", a: ["주장 강조 및 설득", "독자 위로", "창의성 발휘", "기록 보존"], correct: 0, exp: "주장 강조가 목적입니다." }
        ]
    };

    let currentStage = 1;
    let quizData = [];
    let currentIdx = 0;
    let score = 0;
    let timeLeft = 20;
    let timerInterval;
    let isAnswered = false;

    function initStage(stageNum) {
        currentStage = stageNum;
        currentIdx = 0;
        score = 0;
        
        if(stageNum === 3) {
            quizData = [...questionsDB[3]];
        } else {
            quizData = [...questionsDB[stageNum]].sort(() => Math.random() - 0.5).slice(0, 11);
        }

        document.querySelectorAll('.stage-badge').forEach((b, i) => {
            b.className = 'stage-badge' + (i+1 < stageNum ? ' cleared' : i+1 === stageNum ? ' active' : '');
        });
        document.getElementById("game-area").style.display = "block";
        document.getElementById("stage-result").style.display = "none";
        loadQuestion();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ko-KR';
        window.speechSynthesis.speak(ut);
    }

    function startTimer() {
        timeLeft = 20;
        document.getElementById("timer-progress").style.width = "100%";
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById("timer-progress").style.width = (timeLeft / 20 * 100) + "%";
            document.getElementById("timer-text").innerText = Math.ceil(timeLeft) + "초";
            if (timeLeft <= 0) { clearInterval(timerInterval); checkAnswer(-1); }
        }, 100);
    }

    function loadQuestion() {
        isAnswered = false;
        clearInterval(timerInterval);
        const data = quizData[currentIdx];
        
        document.getElementById("progress-text").innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById("question").innerText = data.q;
        document.getElementById("explanation").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        
        const shuffledOptions = [...data.a].sort(() => Math.random() - 0.5);
        shuffledOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(data.a.indexOf(opt));
            optionsDiv.appendChild(btn);
        });
        startTimer();
    }

    function checkAnswer(idx) {
        if(isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);
        
        const data = quizData[currentIdx];
        const btns = document.querySelectorAll(".opt-btn");
        btns.forEach(b => b.disabled = true);

        const correctText = data.a[data.correct];
        if (idx === data.correct) {
            btns.forEach(b => { if(b.innerText === correctText) b.classList.add("correct"); });
            score += 1;
            speak("정답입니다!");
        } else {
            if(idx !== -1) {
                const selectedText = data.a[idx];
                btns.forEach(b => { if(b.innerText === selectedText) b.classList.add("wrong"); });
            }
            btns.forEach(b => { if(b.innerText === correctText) b.classList.add("correct"); });
            speak("오답입니다.");
        }
        
        document.getElementById("explanation").innerHTML = data.exp;
        document.getElementById("explanation").style.display = "block";
        document.getElementById("next-btn").style.display = "block";
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < quizData.length) loadQuestion();
        else showStageResult();
    }

    function showStageResult() {
        document.getElementById("game-area").style.display = "none";
        const resultArea = document.getElementById("stage-result");
        resultArea.style.display = "block";
        
        const totalQ = quizData.length;
        const finalScore = Math.round((score / totalQ) * 100);
        document.getElementById("stage-score").innerText = finalScore;
        
        const feedback = document.getElementById("stage-feedback");
        const actionArea = document.getElementById("action-area");
        actionArea.innerHTML = "";

        const isPassed = score >= (currentStage === 3 ? 15 : 8); 

        if (currentStage < 3) {
            if (isPassed) {
                feedback.innerHTML = `<div class="pass-msg">🎉 스테이지 ${currentStage} 통과!</div>
                                     <p>실력이 대단한걸요? 다음 스테이지에서 기다릴게요!</p>`;
                actionArea.innerHTML = `<button class="action-btn btn-next-stage" onclick="initStage(${currentStage + 1})">다음 스테이지 도전 →</button>`;
            } else {
                feedback.innerHTML = `<div class="fail-msg">😢 아쉽지만 통과 실패 (8문제 이상 정답 필요)</div>
                                     <p>조금만 더 복습해서 다시 도전해 볼까요?</p>`;
                actionArea.innerHTML = `<button class="action-btn btn-retry" onclick="initStage(${currentStage})">다시 도전하기 🔄</button>`;
            }
        } else {
            // 모든 스테이지 클리어 (마지막 단계)
            feedback.innerHTML = `<div class="pass-msg">🏁 마스터 챌린지 최종 성공!</div>
                                 <p>모든 스테이지를 자신의 힘으로 정복한 당신이 자랑스럽습니다.</p>
                                 <div class="reward-box">
                                    스스로의 힘으로 문제를 모두 풀어서 3개 스테이지를 다 깬 사람은,<br>
                                    시험 전 교과서를 들고 민주쌤에게 오시면 도장을 드립니다(암호: 국어100점). 😊
                                 </div>`;
            actionArea.innerHTML = `<button class="action-btn btn-next-stage" onclick="location.reload()">처음부터 다시 하기</button>`;
        }
    }

    alert("📢 국어 B 최종 마스터 챌린지!\n\nSTEP 1, 2에서 8문제 이상 맞춰야 다음 단계로 갈 수 있습니다.\n모두 깬 사람에게는 아주 작은 선물이 기다리고 있어요!");
    initStage(1);
</script>
